<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" role="img" aria-labelledby="ft fd">
  <title id="ft">How rare CO2 is in ordinary air compared with a smokestack</title>
  <desc id="fd">Two grids, each of ten thousand dots. In ordinary air, only about four dots are carbon dioxide. In coal power station exhaust, about one thousand two hundred are. This shows why capturing carbon from the open air is roughly three hundred times harder.</desc>

  <defs>
    <pattern id="dotGrey" width="3.5" height="3.5" patternUnits="userSpaceOnUse">
      <circle cx="1.75" cy="1.75" r="1.15" fill="#ddd5c9"/>
    </pattern>
    <pattern id="dotClay" width="3.5" height="3.5" patternUnits="userSpaceOnUse">
      <circle cx="1.75" cy="1.75" r="1.35" fill="#d97757"/>
    </pattern>
  </defs>

  <rect width="800" height="500" rx="10" fill="#faf7f2"/>

  <text x="36" y="44" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#2a2724">Finding the needle</text>
  <text x="36" y="68" font-family="system-ui, sans-serif" font-size="13.5" fill="#6b645c">Each grid below is 10,000 molecules of gas. The coloured dots are CO₂.</text>

  <!-- ===== LEFT: ordinary air ===== -->
  <text x="36" y="108" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#2a2724">Ordinary air</text>
  <rect x="36" y="120" width="350" height="350" fill="url(#dotGrey)"/>
  <rect x="36" y="120" width="350" height="350" fill="none" stroke="#e2dace"/>
  <!-- the four CO2 molecules -->
  <circle cx="129" cy="188" r="4.6" fill="#d97757"/>
  <circle cx="262" cy="255" r="4.6" fill="#d97757"/>
  <circle cx="94"  cy="366" r="4.6" fill="#d97757"/>
  <circle cx="325" cy="420" r="4.6" fill="#d97757"/>

  <text x="36" y="492" font-family="system-ui, sans-serif" font-size="12.5" fill="#c15f3c" font-weight="600">≈ 4 in every 10,000</text>

  <!-- ===== RIGHT: smokestack ===== -->
  <text x="424" y="108" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#2a2724">Exhaust from a coal power station</text>
  <rect x="424" y="120" width="350" height="350" fill="url(#dotGrey)"/>
  <!-- 12% of the grid = 42px band, drawn as scattered blocks so it doesn't read as a solid bar -->
  <rect x="424" y="120" width="350" height="18" fill="url(#dotClay)"/>
  <rect x="424" y="197" width="350" height="14" fill="url(#dotClay)"/>
  <rect x="424" y="284" width="350" height="11" fill="url(#dotClay)"/>
  <rect x="424" y="392" width="350" height="12" fill="url(#dotClay)"/>
  <rect x="424" y="120" width="350" height="350" fill="none" stroke="#e2dace"/>

  <text x="424" y="492" font-family="system-ui, sans-serif" font-size="12.5" fill="#c15f3c" font-weight="600">≈ 1,200 in every 10,000 — about 300× more concentrated</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800" height="320" role="img" aria-labelledby="st sd">
  <title id="st">How a carbon-catching sponge works</title>
  <desc id="sd">Three steps: air is blown through a sponge-like material that grabs carbon dioxide; the sponge fills up; heating it makes the sponge let go, releasing pure carbon dioxide, and the sponge is reused.</desc>

  <rect width="800" height="320" rx="10" fill="#faf7f2"/>
  <text x="36" y="44" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#2a2724">Catch, then release</text>
  <text x="36" y="67" font-family="system-ui, sans-serif" font-size="13.5" fill="#6b645c">Every carbon-capture machine, however fancy, is doing this one thing over and over.</text>

  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M1 1 L9 5 L1 9" fill="none" stroke="#c3b8a8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- STEP 1 -->
  <g>
    <rect x="36" y="100" width="200" height="150" rx="8" fill="#fff" stroke="#e2dace"/>
    <circle cx="60" cy="124" r="11" fill="#d97757"/>
    <text x="60" y="128.5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#fff">1</text>
    <text x="80" y="129" font-family="system-ui, sans-serif" font-size="13.5" font-weight="700" fill="#2a2724">Blow air through</text>

    <!-- sponge with holes -->
    <rect x="60" y="150" width="152" height="56" rx="7" fill="#efe7db" stroke="#d5cabb"/>
    <g fill="#faf7f2">
      <circle cx="82" cy="166" r="6"/><circle cx="112" cy="180" r="7"/><circle cx="146" cy="164" r="6.5"/>
      <circle cx="180" cy="182" r="6"/><circle cx="98" cy="196" r="5"/><circle cx="164" cy="196" r="5.5"/>
    </g>
    <!-- CO2 caught -->
    <circle cx="112" cy="180" r="3.6" fill="#d97757"/>
    <circle cx="146" cy="164" r="3.6" fill="#d97757"/>
    <circle cx="180" cy="182" r="3.6" fill="#d97757"/>

    <text x="60" y="228" font-family="system-ui, sans-serif" font-size="11.5" fill="#6b645c">CO₂ sticks to the sponge's</text>
    <text x="60" y="243" font-family="system-ui, sans-serif" font-size="11.5" fill="#6b645c">inner surfaces. Everything else</text>
  </g>
  <line x1="248" y1="175" x2="278" y2="175" stroke="#c3b8a8" stroke-width="2" marker-end="url(#ar)"/>

  <!-- STEP 2 -->
  <g>
    <rect x="290" y="100" width="200" height="150" rx="8" fill="#fff" stroke="#e2dace"/>
    <circle cx="314" cy="124" r="11" fill="#d97757"/>
    <text x="314" y="128.5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#fff">2</text>
    <text x="334" y="129" font-family="system-ui, sans-serif" font-size="13.5" font-weight="700" fill="#2a2724">The sponge fills up</text>

    <rect x="314" y="150" width="152" height="56" rx="7" fill="#f5e2d8" stroke="#e0b8a4"/>
    <g fill="#d97757">
      <circle cx="336" cy="166" r="3.6"/><circle cx="366" cy="180" r="3.6"/><circle cx="400" cy="164" r="3.6"/>
      <circle cx="434" cy="182" r="3.6"/><circle cx="352" cy="196" r="3.6"/><circle cx="418" cy="196" r="3.6"/>
      <circle cx="386" cy="196" r="3.6"/><circle cx="450" cy="166" r="3.6"/><circle cx="330" cy="186" r="3.6"/>
    </g>

    <text x="314" y="228" font-family="system-ui, sans-serif" font-size="11.5" fill="#6b645c">Now it's saturated — it can't</text>
    <text x="314" y="243" font-family="system-ui, sans-serif" font-size="11.5" fill="#6b645c">hold any more.</text>
  </g>
  <line x1="502" y1="175" x2="532" y2="175" stroke="#c3b8a8" stroke-width="2" marker-end="url(#ar)"/>

  <!-- STEP 3 -->
  <g>
    <rect x="544" y="100" width="220" height="150" rx="8" fill="#fff" stroke="#e2dace"/>
    <circle cx="568" cy="124" r="11" fill="#d97757"/>
    <text x="568" y="128.5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#fff">3</text>
    <text x="588" y="129" font-family="system-ui, sans-serif" font-size="13.5" font-weight="700" fill="#2a2724">Heat it — it lets go</text>

    <rect x="568" y="150" width="152" height="56" rx="7" fill="#efe7db" stroke="#d5cabb"/>
    <g fill="#faf7f2">
      <circle cx="590" cy="166" r="6"/><circle cx="620" cy="180" r="7"/><circle cx="654" cy="164" r="6.5"/>
      <circle cx="688" cy="182" r="6"/><circle cx="606" cy="196" r="5"/><circle cx="672" cy="196" r="5.5"/>
    </g>
    <!-- escaping CO2 -->
    <g fill="#d97757">
      <circle cx="612" cy="138" r="3.4" opacity="0.9"/>
      <circle cx="646" cy="130" r="3.4" opacity="0.7"/>
      <circle cx="680" cy="142" r="3.4" opacity="0.5"/>
    </g>
    <text x="568" y="228" font-family="system-ui, sans-serif" font-size="11.5" fill="#6b645c">Pure CO₂ comes off, ready to bury.</text>
    <text x="568" y="243" font-family="system-ui, sans-serif" font-size="11.5" fill="#c15f3c" font-weight="600">This heating step is the expensive bit.</text>
  </g>

  <path d="M756 175 C 782 175, 782 272, 400 272 C 60 272, 46 230, 46 200" fill="none" stroke="#c3b8a8" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ar)"/>
  <text x="400" y="292" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11.5" font-style="italic" fill="#8a8175">…and the sponge goes back to work. A good one survives thousands of these cycles.</text>
</svg>

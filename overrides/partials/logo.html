<a href="{{ config.site_url | default(nav.homepage.url, true) | url }}" class="md-header__button md-logo" aria-label="{{ config.site_name }}" title="{{ config.site_name }}">
  <svg class="lattice-logo" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" width="50" height="50" aria-hidden="true">
    <!-- center atom (anchor) -->
    <circle class="atom-center" cx="24" cy="24" r="4.4" fill="#e8b4a0" stroke="#d97757" stroke-width="1.5"/>

    <!-- each corner = atom + its 2 edges + its diagonal, grouped so they move together -->
    <g class="corner corner-tl">
      <path d="M12 12 L36 12 M12 12 L12 36 M12 12 L24 24" stroke="#d97757" stroke-width="2" stroke-linecap="round" fill="none"/>
      <circle class="atom" cx="12" cy="12" r="3.6" fill="#d97757"/>
    </g>
    <g class="corner corner-tr">
      <path d="M36 12 L36 36 M36 12 L24 24" stroke="#d97757" stroke-width="2" stroke-linecap="round" fill="none"/>
      <circle class="atom" cx="36" cy="12" r="3.6" fill="#d97757"/>
    </g>
    <g class="corner corner-br">
      <path d="M36 36 L12 36 M36 36 L24 24" stroke="#d97757" stroke-width="2" stroke-linecap="round" fill="none"/>
      <circle class="atom" cx="36" cy="36" r="3.6" fill="#d97757"/>
    </g>
    <g class="corner corner-bl">
      <path d="M12 36 L24 24" stroke="#d97757" stroke-width="2" stroke-linecap="round" fill="none"/>
      <circle class="atom" cx="12" cy="36" r="3.6" fill="#d97757"/>
    </g>
  </svg>
